name: Build NX30PRO OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            diffutils fastjar flex gawk gettext gettext-base git gnutls-dev \
            gperf graphviz xsltproc grub2-common haveged intltool \
            isc-dhcp-client iptables libasio-dev libavahi-compat-libdnssd-dev \
            libboost-all-dev libbz2-dev libc-ares-dev libcap-dev \
            libcurl4-openssl-dev libdevmapper-dev libelf-dev libev-dev \
            libevent-dev libexpat1-dev libfcgi-dev libgcrypt-dev libgmp-dev \
            libgnutls28-dev libgoogle-glog-dev libgpg-error-dev libidn2-dev \
            libjson-c-dev libldap2-dev liblua5.3-dev liblzma-dev libmagic-dev \
            libmcrypt-dev libncurses-dev libncurses5-dev libnetfilter-conntrack-dev \
            libnetfilter-log-dev libnfnetlink-dev libnftnl-dev libnl-3-dev \
            libnl-route-3-dev libpcre2-dev libpng-dev libpython3-dev libsctp-dev \
            libsqlite3-dev libssl-dev libtool libudev-dev libunbound-dev \
            libusb-1.0-0 libusb-dev libxml2-dev libxml2-utils libxslt1-dev \
            libyaml-cpp-dev libzmq3-dev libzstd-dev linux-headers-generic \
            locales lua5.3 lzop m4 make meson msr-tools nasm ninja-build \
            openssh-client openssl p7zip-full patch patchutils pciutils \
            pkg-config po4a python3 python3-setuptools python3-pip \
            python3-pyelftools python3-yaml qemu-utils rsync ruby scons \
            squashfs-tools subversion swig time tmux tree uglifyjs unzip \
            vim virtualenv wget xdg-utils xmlstarlet zlib1g-dev zstd
          sudo timedatectl set-timezone Asia/Shanghai
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth 1 https://github.com/padavanonly/immortalwrt-mt798x-6.6 openwrt
          cd openwrt

      - name: Update Feeds
        run: |
          cd openwrt
          echo "src-git argon https://github.com/jerrykuku/luci-theme-argon.git;openwrt-24.10" >> feeds.conf.default
          ./scripts/feeds update -a

      - name: Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a

      - name: Custom Configuration
        run: |
          cd openwrt
          make defconfig BOARD=mediatek SUBTARGET=filogic

          cat >> .config << 'EOF'
          # ====== 自定义插件配置 ======

          # LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-base=y
          CONFIG_PACKAGE_luci-lib-ip=y
          CONFIG_PACKAGE_luci-lib-ipkg=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-lib-nlcore=y

          # 网络基础
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_opkg=y

          # IPv6
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_ip6tables=y
          CONFIG_PACKAGE_ip6tables-nft=y
          CONFIG_PACKAGE_kmod-ipt-ipv6=y
          CONFIG_PACKAGE_kmod-nf-ipv6=y
          CONFIG_PACKAGE_kmod-ip6tables=y
          CONFIG_PACKAGE_kmod-nf-reject6=y
          CONFIG_PACKAGE_luci-proto-ipv6=y

          # 网络数据监控
          CONFIG_PACKAGE_nlbwmon=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-i18n-nlbwmon-zh-cn=y

          # Argon 主题
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y
          CONFIG_PACKAGE_luci-app-argone=y

          # TTYD 终端
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y

          # ZeroTier
          CONFIG_PACKAGE_zerotier=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y

          # re:Guard
          CONFIG_PACKAGE_luci-app-reguard=y
          CONFIG_PACKAGE_luci-i18n-reguard-zh-cn=y

          # UPnP
          CONFIG_PACKAGE_miniupnpd=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y

          # Cloudflare Tunnel
          CONFIG_PACKAGE_cloudflared=y
          CONFIG_PACKAGE_luci-app-cloudflared=y
          CONFIG_PACKAGE_luci-i18n-cloudflared-zh-cn=y

          # KMS
          CONFIG_PACKAGE_vlmcsd=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_luci-i18n-vlmcsd-zh-cn=y

          # Nano
          CONFIG_PACKAGE_nano=y

          # iPerf3
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_luci-app-iperf3=y
          CONFIG_PACKAGE_luci-i18n-iperf3-zh-cn=y

          # 常用工具
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_diffutils=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_block-mount=y

          # 文件系统
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-extras=y
          CONFIG_PACKAGE_ntfs-3g=y
          CONFIG_PACKAGE_ntfs-3g-utils=y
          CONFIG_PACKAGE_exfat-utils=y
          CONFIG_PACKAGE_exfat-mkfs=y

          # 多语言
          CONFIG_BUILD_NLS=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

          # 编译优化
          CONFIG_CCACHE=y
          EOF

          sed -i 's/^\s*//g' .config
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 || true

      - name: Organize Firmware Files
        run: |
          mkdir -p output
          find openwrt/bin/targets/ -type f \( -name "*.bin" -o -name "*.tar.gz" -o -name "*.json" \) | while read f; do
            cp "$f" output/
          done
          ls -lh output/

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NX30PRO_OpenWrt
          path: output/*
          retention-days: 30
